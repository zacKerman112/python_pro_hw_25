<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auth Chat</title>
    <style>
      body {
        align-items: center;
        background: #f5f7fb;
        color: #172033;
        display: flex;
        font-family: Arial, sans-serif;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
      }

      .card {
        background: white;
        border-radius: 16px;
        box-shadow: 0 16px 40px rgba(23, 32, 51, 0.12);
        padding: 32px;
        width: min(560px, calc(100vw - 32px));
      }

      .auth-bar {
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .auth-bar a {
        color: #2563eb;
        text-decoration: none;
      }

      .form {
        display: flex;
        gap: 12px;
        margin: 24px 0;
      }

      input {
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        flex: 1;
        font-size: 16px;
        padding: 12px 14px;
      }

      input:disabled {
        background: #f8fafc;
        color: #94a3b8;
      }

      button {
        background: #2563eb;
        border: 0;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font-size: 16px;
        padding: 12px 18px;
      }

      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      .status,
      .guest-note {
        color: #64748b;
        font-size: 14px;
      }

      .guest-note {
        background: #fff7ed;
        border-left: 4px solid #f59e0b;
        border-radius: 10px;
        margin-bottom: 16px;
        padding: 12px 14px;
      }

      .messages {
        display: grid;
        gap: 10px;
        margin-top: 20px;
      }

      .message {
        background: #eff6ff;
        border-left: 4px solid #2563eb;
        border-radius: 10px;
        padding: 12px 14px;
      }

      .username {
        color: #1d4ed8;
        font-weight: 700;
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="auth-bar">
        <h1>Чат</h1>
        {% if user.is_authenticated %}
          <div>
            Ви увійшли як <strong>{{ user.username }}</strong>
            <a href="{% url 'logout' %}">Вийти</a>
          </div>
        {% else %}
          <div>
            <a href="{% url 'login' %}">Увійти</a>
            |
            <a href="{% url 'signup' %}">Реєстрація</a>
          </div>
        {% endif %}
      </div>

      <p class="status" id="status">Підключення...</p>

      {% if not user.is_authenticated %}
        <p class="guest-note">
          Ви переглядаєте чат як гість. Щоб писати повідомлення, увійдіть або зареєструйтесь.
        </p>
      {% endif %}

      <form class="form" id="chat-form">
        <input
          id="message-input"
          autocomplete="off"
          placeholder="{% if user.is_authenticated %}Введіть повідомлення{% else %}Гостям писати заборонено{% endif %}"
          type="text"
          {% if not user.is_authenticated %}disabled{% endif %}
        />
        <button
          id="send-button"
          type="submit"
          {% if not user.is_authenticated %}disabled{% endif %}
        >
          Надіслати
        </button>
      </form>

      <section class="messages" id="messages"></section>
    </main>

    <script>
      const isAuthenticated = {{ user.is_authenticated|yesno:"true,false" }};
      const form = document.querySelector("#chat-form");
      const input = document.querySelector("#message-input");
      const sendButton = document.querySelector("#send-button");
      const statusElement = document.querySelector("#status");
      const messagesElement = document.querySelector("#messages");
      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(`${protocol}://${window.location.host}/ws/chat/`);

      socket.addEventListener("open", () => {
        statusElement.textContent = "Підключено";
        if (isAuthenticated) {
          sendButton.disabled = false;
        }
      });

      socket.addEventListener("message", (event) => {
        const data = JSON.parse(event.data);

        if (data.error === "auth_required") {
          statusElement.textContent = "Гостям писати заборонено";
          return;
        }

        addMessage(data.username, data.message);
      });

      socket.addEventListener("close", () => {
        statusElement.textContent = "Відключено";
        sendButton.disabled = true;
      });

      socket.addEventListener("error", () => {
        statusElement.textContent = "Помилка підключення";
        sendButton.disabled = true;
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        if (!isAuthenticated) {
          return;
        }

        const message = input.value.trim();
        if (!message || socket.readyState !== WebSocket.OPEN) {
          return;
        }

        socket.send(JSON.stringify({ message }));
        input.value = "";
        input.focus();
      });

      function addMessage(username, message) {
        const item = document.createElement("article");
        item.className = "message";

        const author = document.createElement("div");
        author.className = "username";
        author.textContent = username;

        const text = document.createElement("div");
        text.textContent = message;

        item.append(author, text);
        messagesElement.prepend(item);
      }
    </script>
  </body>
</html>
